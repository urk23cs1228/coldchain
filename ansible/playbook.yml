---
# ColdChain AI — Ansible Playbook
# Phase 4: Automates kubectl apply for all Kubernetes manifests
#
# Usage:
#   ansible-playbook ansible/playbook.yml \
#     -e "resource_group=coldchain-rg aks_cluster=coldchain-aks image_tag=<SHA>"
#
# Prerequisites on control node:
#   pip install ansible
#   az login
#   az aks get-credentials --resource-group <rg> --name <aks>

- name: Deploy ColdChain AI to AKS
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    resource_group: "coldchain-rg"
    aks_cluster: "coldchain-aks"
    acr_name: "coldchainacr"
    image_tag: "latest"
    k8s_dir: "{{ playbook_dir }}/../k8s"
    manifest_image: "{{ acr_name }}.azurecr.io/coldchain-ai:{{ image_tag }}"

  tasks:

    - name: "Phase 4.1 — Get AKS credentials"
      command: >
        az aks get-credentials
        --resource-group {{ resource_group }}
        --name {{ aks_cluster }}
        --overwrite-existing
      register: aks_creds
      changed_when: true

    - name: "Phase 4.2 — Substitute image tag in deployment manifest"
      replace:
        path: "{{ k8s_dir }}/deployment.yaml"
        regexp: 'IMAGE_PLACEHOLDER'
        replace: "{{ manifest_image }}"
      notify: Reset image placeholder

    - name: "Phase 4.3 — Apply Kubernetes Deployment"
      command: kubectl apply -f {{ k8s_dir }}/deployment.yaml
      register: deploy_result
      changed_when: "'configured' in deploy_result.stdout or 'created' in deploy_result.stdout"

    - name: "Phase 4.4 — Apply Kubernetes Service"
      command: kubectl apply -f {{ k8s_dir }}/service.yaml
      register: svc_result
      changed_when: "'configured' in svc_result.stdout or 'created' in svc_result.stdout"

    - name: "Phase 4.5 — Wait for deployment rollout"
      command: kubectl rollout status deployment/coldchain-ai --timeout=120s
      register: rollout
      changed_when: false

    - name: "Phase 4.6 — Show running pods"
      command: kubectl get pods -l app=coldchain-ai -o wide
      register: pods
      changed_when: false

    - name: Print pod status
      debug:
        msg: "{{ pods.stdout_lines }}"

    - name: "Phase 4.7 — Show service and external IP"
      command: kubectl get svc coldchain-ai-service
      register: svc_info
      changed_when: false

    - name: Print service info
      debug:
        msg: "{{ svc_info.stdout_lines }}"

  handlers:
    - name: Reset image placeholder
      replace:
        path: "{{ k8s_dir }}/deployment.yaml"
        regexp: "{{ manifest_image }}"
        replace: 'IMAGE_PLACEHOLDER'
